<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#EC4899" /> <!-- Pink -->
    </linearGradient>
    <linearGradient id="gradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#8B5CF6" /> <!-- Violet -->
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#4F46E5" flood-opacity="0.35" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Outer Elegant AI Spark -->
    <path d="M 64 12 
             C 64 50, 50 64, 12 64 
             C 50 64, 64 78, 64 116 
             C 64 78, 78 64, 116 64 
             C 78 64, 64 50, 64 12 Z" 
          fill="url(#gradient1)" />
          
    <!-- Inner Sharp Spark -->
    <path d="M 64 36 
             Q 64 64 36 64 
             Q 64 64 64 92 
             Q 64 64 92 64 
             Q 64 64 64 36 Z" 
          fill="url(#gradient2)" />

    <!-- Center pure white glowing dot -->
    <circle cx="64" cy="64" r="8" fill="#FFFFFF" />
  </g>
</svg>
